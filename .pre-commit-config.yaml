repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
        args:
          - '--assume-in-merge'
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args:
          - '--fix=lf'
      - id: sort-simple-yaml
      - id: trailing-whitespace
        exclude: \.ambr$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.16.0"
    hooks:
      - id: ruff
        args:
          - "--fix"
          - "--exit-non-zero-on-fix"
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: "uv run mypy src tests"
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        verbose: true

      - id: guardrail-output-json-schema
        name: check GuardrailOutput JSON schema is up to date
        entry: "uv run python scripts/generate_json_schema.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/types\.py|scripts/generate_json_schema\.py|schemas/guardrail_output\.schema\.json)$

      - id: guardrail-metadata-json
        name: check guardrail metadata JSON is up to date
        entry: "uv run python scripts/generate_metadata_json.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(taxonomy|registry|base)\.py|scripts/generate_metadata_json\.py|schemas/guardrail_metadata\.json)$

      - id: guardrail-prompts-json
        name: check guardrail prompts JSON is up to date
        entry: "uv run python scripts/generate_prompts_json.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(prompts|prompt_registry|base)\.py|scripts/generate_prompts_json\.py|schemas/guardrail_prompts\.json)$

      - id: guardrail-content-json
        name: check guardrail content JSON is up to date
        entry: "uv run python scripts/generate_content_json.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(content|content_registry|_authored_content_data|base)\.py|scripts/generate_content_json\.py|schemas/guardrail_content\.json)$

      - id: guardrail-parameter-data
        name: check generated parameter data is up to date
        entry: "uv run python scripts/generate_parameter_data.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(guardrails/.*|parameters|content_registry|prompt_registry|base)\.py|src/any_guardrail/_parameter_data\.py|scripts/generate_parameter_data\.py)$

      - id: guardrail-parameters-json
        name: check guardrail parameters JSON is up to date
        entry: "uv run python scripts/generate_parameters_json.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(parameter_registry|parameters|_parameter_data)\.py|scripts/generate_parameters_json\.py|schemas/guardrail_parameters\.json)$

      - id: guardrail-prompt-catalog
        name: check prompt/content catalog is up to date
        entry: "uv run python scripts/generate_prompt_catalog.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(prompts|prompt_registry|content|content_registry|_authored_content_data|base|registry)\.py|scripts/generate_prompt_catalog\.py|docs/prompt_catalog\.md)$

      - id: guardrail-summary-nav
        name: check guardrail SUMMARY navigation is up to date
        entry: "uv run python scripts/generate_summary.py --check"
        language: system
        pass_filenames: false
        files: ^(src/any_guardrail/(taxonomy|registry|base)\.py|scripts/generate_summary\.py|docs/SUMMARY\.md)$

  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.3"
    hooks:
      - id: codespell
        exclude: CODE_OF_CONDUCT.md|tests/assets

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
